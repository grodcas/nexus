    expected: { action: window, query_contains: [], session: null }
    success: { mode: judge, predicate: "Action is `window`. Query expresses the intent even if the exact verb is not 'minimize all'. This case is hard by design — we want to see whether the router gets it approximately right." }
    latency_class: window
    latency_budget_ms: 2000
    requires_trigger: true
    notes: >
      Deliberately a hard case. "Minimize everything except X" has no
      direct verb in the window handler — expect a partial match or a
      reasonable failure, not a hang. Tracks whether the router passes
      the intent through rather than silently dropping it.

  - id: focus-07
