  - id: focus-08
    bucket: focus
    utterance: jarvis put the editor on the left and the terminal on the right
    expected: { action: window, query_contains: [], session: null }
    success: { mode: judge, predicate: "Action is `window`. Either a compound query that mentions both halves, or the first half handled and the second reported as not-yet-done. Fails silently if nothing happens." }
    latency_class: window
    latency_budget_ms: 2500
    requires_trigger: true
    notes: >
      Compound-within-one-action variant. The handler currently
      supports one verb per call, so this is a known hard case.
      Tracked to see if the router splits it or drops half.

