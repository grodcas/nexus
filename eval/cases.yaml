# =============================================================================
# Nexus — Plan 2 eval cases
# =============================================================================
#
# This file is the honest picture of how a drone engineer at Xer
# Technologies actually uses a voice-driven operational agent. It is
# NOT a feature-coverage matrix. Cases are grouped by user scenario
# (morning triage, mid-task lookup, focus setup, …) rather than by
# tool, because the user doesn't think "I will now invoke the window
# tool" — they think "get out of my way, I need to code."
#
# -----------------------------------------------------------------------------
# Schema
# -----------------------------------------------------------------------------
#
# Each case is a mapping with these fields:
#
#   id:          short unique string (`morning-01`, `search-drone-05`)
#   bucket:      scenario bucket the case belongs to
#   utterance:   what the user SAYS, verbatim, with punctuation close to
#                how Gemini Live's transcription tends to render it
#   expected:
#     action:    the `action` arg we expect Gemini to pass to do(),
#                or null if the right answer is NO tool call
#                (trivial knowledge, small talk, clarification)
#     query_contains:
#                list of lowercase substrings that must appear in the
#                `query` arg on a correct routing (order-agnostic).
#                Empty list → only the action name is graded.
#     session:   the `session` arg, if the action is `code` in the
#                second step of a handoff; null otherwise
#   success:
#     mode:      exact | contains | judge | no_tool
#     predicate: for `contains`: a lowercase substring the handler
#                result must include. For `judge`: a one-sentence
#                rubric for the Haiku grader. For `no_tool`: always
#                succeeds if no tool call was made.
#   latency_class: knowledge | briefing | window | documents | search | code
#   latency_budget_ms:
#                TTFW ceiling for this case class. Past this, the
#                case fails the latency axis even if routing and
#                success are fine.
#   requires_trigger: true if the utterance should be gated by
#                the trigger-word hard gate (most tool calls),
#                false for trivial knowledge / small talk
#   context:     (optional) list of prior (user, assistant) turns
#                this case depends on. Used for pronouns, corrections,
#                and multi-turn flows. The harness replays the prior
#                turns (without scoring them) before the case's
#                utterance is sent.
#   notes:       (optional) freeform rationale for this case's
#                existence — the reason a future you should NOT delete
#                it in a cleanup pass
#
# -----------------------------------------------------------------------------
# Scoring discipline
# -----------------------------------------------------------------------------
#
# The harness runs every case N=5 times (configurable) and reports:
#
#   routing      — % runs where `action` matches expected.action
#                  (or no tool call for `no_tool` cases)
#   task_success — % runs where the success predicate holds
#   latency      — % runs under latency_budget_ms
#   stability    — % runs where BOTH routing and success agree
#                  across all N repetitions
#
# A case passes only if ALL four hold ≥ target. Target is 90% for
# routing+success+stability and 80% for latency (latency has more
# natural variance).
#
# -----------------------------------------------------------------------------
# Budget rationale (latency_budget_ms, text-mode, Python side only)
# -----------------------------------------------------------------------------
#
# These are HANDLER budgets. STT and TTS latency are added back
# analytically by the harness (measured once per length bucket). A
# budget of 2000ms means: handle_tool must return within 2s of the
# simulated text turn arriving, which, with the fixed STT+TTS
# offsets, gives the user a perceived response time under ~3s.
#
#   knowledge   1500   Gemini answers from its own knowledge; no tool
#                      call, no handler. Measures routing discipline.
#   briefing    2000   Post-1C management reads are <5ms, budget is
#                      generous for the Gemini turn itself.
#   window      2000   PyObjC reads + osascript write, bounded by
#                      _process_exists + 5s _osa timeout.
#   documents   2000   Grep over ~25 markdown files, sub-ms.
#   search      15000  Inner Claude subprocess dominates. Plan 2
#                      hybridization will pull this down, but the
#                      baseline target for Plan 2 completion is 15s.
#   code        2000   List-sessions path is sub-ms; handoff arming
#                      returns immediately and the actual Claude
#                      mode is out of scope for this harness.
#
# =============================================================================

version: 1
date: 2026-04-15
# Number of repetitions per case when running for stability scoring.
# Single-pass runs (quick sweep during dev) pass `--repeats=1`.
default_repeats: 5

buckets:
  - id: knowledge
    title: Trivial knowledge — must NOT call a tool
    rationale: >
      The single most common class of utterance in any real conversation
      is not a command — it is a question the model already knows the
      answer to. If Gemini calls a tool for these, the product feels
      broken ("why did it open a browser when I asked how TDLAS works?").
      This bucket exists to catch trigger-word bleed and context-
      sensitivity bias. No trigger word, no tool call.

  - id: morning
    title: Morning triage — briefing, calendar, inbox
    rationale: >
      The daily ritual of "sit down, find out what today is." A user
      here wants spoken summaries, not opened apps. Everything in this
      bucket reads from the pre-synced management worktree.

  - id: focus
    title: Workspace setup for deep work
    rationale: >
      Ginés about to start a coding or writing session. Wants windows
      moved, apps focused, distractions hidden. Fast, silent, doesn't
      steal focus.

  - id: lookup
    title: Mid-task fact lookup (knowledge or live web)
    rationale: >
      Writing a report, needs a specific fact. The right tool depends on
      whether it's something Gemini already knows (answer directly) or
      something that needs the web (browse). Hardest routing choice in
      the product — this bucket measures it.

  - id: documents
    title: Find my own files
    rationale: >
      Core "find the thing" pain from the original product brief.
      Queries the local documents worktree. No specific filenames
      memorized — the user describes the file by content, date, or
      project.

  - id: research
    title: Web research bursts
    rationale: >
      You need a datasheet, a regulation, a spec, a benchmark. Inner
      Claude nav agent drives a visible Chromium. This is the slowest
      action and therefore the one most in need of an ack and a warm
      browser.

  - id: code_handoff
    title: Two-step handoff into Claude Code
    rationale: >
      The "connect to project X" flow — first call lists sessions,
      second call stages the handoff and tears down the Gemini session.
      Must never fire on ambiguous utterances ("connect the bluetooth"
      should not trigger a project connect).

  - id: multi_turn
    title: Pronouns, context carry, follow-ups
    rationale: >
      A conversation is a turn sequence. This bucket replays prior
      turns before the case's utterance so we can test "do it again",
      "the other one", "also put it on the right".

  - id: correction
    title: Mid-turn corrections and interrupts
    rationale: >
      "No wait, not that one." "Stop, cancel." Tests that Nexus can
      recover gracefully and that an in-flight TTS can be killed.

  - id: disfluent
    title: Natural disfluent speech
    rationale: >
      Real voice input is full of "um", "uh", "so like", repetitions,
      restarts. STT delivers these to Gemini as-is. The router must
      still extract intent.

  - id: compound
    title: Compound and sequential commands
    rationale: >
      "Search for X and put the browser on the right." Tests whether
      Gemini sequences actions cleanly or picks one and drops the
      other. Spoiler: this is a known weak spot and most cases here
      will initially fail.

  - id: small_talk
    title: Small talk and meta questions
    rationale: >
      "How are you?" "What can you do?" "Are you there?" These are
      social glue, not commands. Must not call a tool, must answer
      conversationally.

# =============================================================================
# Cases
# =============================================================================

